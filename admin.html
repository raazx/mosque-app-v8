<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الخطيب المباشرة</title>
    <style>
        :root { --primary: #12372A; --secondary: #436850; --danger: #d32f2f; }
        * { box-sizing: border-box; font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; color: var(--primary); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        h1 { font-size: 20px; text-align: center; margin-bottom: 20px; color: var(--primary); }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 1px solid #ced4da; font-size: 16px; margin: 15px 0; resize: none; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-voice { background: #ff6e40; color: white; }
        .recording { background: var(--danger) !important; animation: pulse 1.5s infinite; }
        .live-box { width: 100%; min-height: 60px; padding: 12px; background: #fff5f5; border: 1px solid #ffe3e5; border-radius: 8px; font-size: 16px; color: var(--danger); margin-top: 10px; }
        .status-box { width: 100%; padding: 10px 14px; background: #e8f5ee; border: 1px solid #c8e6d4; border-radius: 8px; font-size: 13px; color: #1a7a4a; margin-bottom: 16px; font-weight: bold; text-align: center; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ لوحة تحكم الخطيب والمسؤول (المنبر)</h1>

        <div class="status-box" id="firebase-status">
            🔗 متصل بـ Firebase: mosqa-app (asia-southeast1)
        </div>

        <p><strong>الخيار 1: اكتب النص العربي واضغط نشر:</strong></p>
        <textarea id="admin-input" placeholder="اكتب نص الخطبة هنا... مثلاً: اتقوا الله عباد الله"></textarea>
        <button class="btn-blue" onclick="publishText()">📢 نشر وتحديث النص عند المصلين</button>

        <hr style="border:0; border-top: 1px dashed #ccc; margin: 20px 0;">

        <p><strong>الخيار 2: التحدث المباشر الفوري (الذكاء الاصطناعي):</strong></p>
        <button id="voice-btn" class="btn-voice" onclick="toggleVoice()">🎙️ تشغيل الميكروفون والبث الفوري</button>
        <div id="live-arabic" class="live-box">الميكروفون مغلق حالياً...</div>
    </div>

    <script>
        // ✅ Firebase URL المحدث
        const FIREBASE_DB_URL = "https://mosqa-app-default-rtdb.asia-southeast1.firebasedatabase.app/sermon.json";

        let recognition;
        let isRecording = false;
        let lastTimestamp = 0;

        async function sendToCloud(text) {
            if (!text.trim()) return;
            try {
                const res = await fetch(FIREBASE_DB_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, timestamp: Date.now() })
                });
                if (res.ok) {
                    document.getElementById('firebase-status').textContent = '✅ تم الإرسال بنجاح إلى Firebase';
                    document.getElementById('firebase-status').style.background = '#e8f5ee';
                } else {
                    document.getElementById('firebase-status').textContent = '⚠️ خطأ في الإرسال — تحقق من قواعد Firebase';
                    document.getElementById('firebase-status').style.background = '#fff3cd';
                }
            } catch (e) {
                document.getElementById('firebase-status').textContent = '❌ تعذر الاتصال بـ Firebase';
                document.getElementById('firebase-status').style.background = '#fdecea';
                console.error(e);
            }
        }

        function publishText() {
            const txt = document.getElementById('admin-input').value;
            if (!txt.trim()) return;
            sendToCloud(txt);
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ar-SA';

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }
                let fullText = finalTranscript || interimTranscript;
                if (fullText.trim()) {
                    document.getElementById('live-arabic').innerText = fullText;
                    let now = Date.now();
                    if (now - lastTimestamp > 500) {
                        sendToCloud(fullText);
                        lastTimestamp = now;
                    }
                }
            };

            recognition.onerror = function() { stopRecording(); };
            recognition.onend = function() { if (isRecording) recognition.start(); };
        }

        function toggleVoice() {
            if (isRecording) stopRecording();
            else startRecording();
        }

        function startRecording() {
            if (!recognition) {
                alert('المتصفح لا يدعم التعرف على الصوت. استخدم Chrome.');
                return;
            }
            recognition.start();
            isRecording = true;
            document.getElementById('voice-btn').innerText = "🛑 الميكروفون يرسل البث الآن... (اضغط للإيقاف)";
            document.getElementById('voice-btn').className = "btn-voice recording";
        }

        function stopRecording() {
            if (!recognition) return;
            recognition.stop();
            isRecording = false;
            document.getElementById('voice-btn').innerText = "🎙️ تشغيل الميكروفون والبث الفوري";
            document.getElementById('voice-btn').className = "btn-voice";
            document.getElementById('live-arabic').innerText = "الميكروفون مغلق حالياً...";
        }
    </script>
</body>
</html>
